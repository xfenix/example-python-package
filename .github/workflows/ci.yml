name: CI

on:
  push:
    branches: ["**"]
    tags: ["[0-9]+.[0-9]+.[0-9]+", "v[0-9]+.[0-9]+.[0-9]+"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: write # branch-push auto-commit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: extractions/setup-just@v3
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - run: uv sync

      # Branch pushes (not tags, not PRs): auto-fix and commit back.
      - name: Auto-fix on branch push
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          just fix
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "style: auto-fix [skip ci]"
            git push
          fi

      # PRs and tags: check-only, fail if code isn't already fixed.
      - name: Lint (check-only)
        if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/')
        run: just lint

      - name: Type check
        run: just types

      - name: Tests
        run: just test

      # Publish coverage badge to the gh-pages branch (default branch only).
      - name: Coverage badge
        if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: we-cli/coverage-badge-action@main

  publish:
    needs: quality
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Publish to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          just publish "$VERSION"
